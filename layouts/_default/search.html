<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Search — ishistory</title>
<meta name="description" content="Search all episodes across every ishistory series.">
<link rel="canonical" href="{{ .Permalink }}">
<meta name="robots" content="index, follow">
<meta name="theme-color" content="#080b14">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=Josefin+Sans:wght@300;400;600&family=Crimson+Pro:ital,wght@0,300;0,400;1,300;1,400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/main.css">
<style>
  .search-hero { padding: 9rem 3.5rem 4rem; position: relative; z-index: 1; }
  .search-hero::before { content: ''; position: absolute; top: 72px; left: 3.5rem; right: 3.5rem; height: 1px; background: linear-gradient(to right, var(--clay), rgba(200,151,58,0.5), transparent 65%); }
  .search-label { font-family: 'Josefin Sans', sans-serif; font-size: 0.65rem; letter-spacing: 0.28em; text-transform: uppercase; color: var(--ember); margin-bottom: 1rem; opacity: 0.85; }
  .search-title { font-family: 'Libre Baskerville', serif; font-size: clamp(2.5rem, 5vw, 4rem); font-weight: 700; font-style: italic; color: var(--cream); margin-bottom: 2.5rem; }
  .search-input-wrap { position: relative; max-width: 640px; }
  .search-input { width: 100%; background: rgba(16,12,8,0.8); border: 1px solid rgba(160,144,120,0.2); color: var(--parchment); font-family: 'Crimson Pro', serif; font-size: 1.15rem; padding: 1.1rem 1.5rem; outline: none; transition: border-color 0.2s; }
  .search-input:focus { border-color: rgba(200,151,58,0.4); }
  .search-input::placeholder { color: var(--dust); font-style: italic; }

  .search-results { padding: 2rem 3.5rem 8rem; position: relative; z-index: 1; max-width: 860px; }
  .result-count { font-family: 'Josefin Sans', sans-serif; font-size: 0.62rem; letter-spacing: 0.15em; text-transform: uppercase; color: var(--dust); margin-bottom: 2rem; }
  .result-card { display: block; text-decoration: none; color: inherit; padding: 1.8rem 2rem; border: 1px solid rgba(160,144,120,0.08); background: rgba(16,12,8,0.5); margin-bottom: 1px; transition: background 0.2s, border-color 0.2s; position: relative; overflow: hidden; }
  .result-card::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 2px; background: linear-gradient(to bottom, var(--clay), var(--amber)); transform: scaleY(0); transform-origin: bottom; transition: transform 0.28s; }
  .result-card:hover { background: rgba(22,16,10,0.8); border-color: rgba(200,151,58,0.15); }
  .result-card:hover::before { transform: scaleY(1); }
  .result-series { font-family: 'Josefin Sans', sans-serif; font-size: 0.57rem; letter-spacing: 0.2em; text-transform: uppercase; color: var(--ember); margin-bottom: 0.4rem; opacity: 0.8; }
  .result-title { font-family: 'Libre Baskerville', serif; font-size: 1.2rem; font-weight: 700; color: var(--cream); margin-bottom: 0.4rem; transition: color 0.2s; }
  .result-card:hover .result-title { color: var(--ember-hi); }
  .result-desc { font-family: 'Crimson Pro', serif; font-size: 0.95rem; color: var(--fog); line-height: 1.6; }
  .no-results { font-family: 'Crimson Pro', serif; font-size: 1.1rem; font-style: italic; color: var(--fog); padding: 3rem 0; }

  @media (max-width: 768px) {
    .search-hero, .search-results { padding-left: 1.5rem; padding-right: 1.5rem; }
    .search-hero { padding-top: 7rem; }
  }
</style>
<script async src="https://www.googletagmanager.com/gtag/js?id={{ .Site.Params.googleAnalytics }}"></script>
<script>window.dataLayer=window.dataLayer||[];function gtag(){dataLayer.push(arguments);}gtag("js",new Date());gtag("config","{{ .Site.Params.googleAnalytics }}");</script>
</head>
<body>
<div class="cosmos"><div class="cosmos-base"></div><div class="cosmos-nebula-1"></div><div class="cosmos-nebula-2"></div><div class="cosmos-nebula-3"></div><div class="cosmos-stars"></div><div class="cosmos-grain"></div></div>

<div class="nav-drawer" id="navDrawer">
  <a href="/" onclick="closeNav()">Home</a>
  <a href="/" onclick="closeNav()">All Series</a>
</div>
<nav id="mainNav">
  <a href="/" class="nav-logo">is<span>history</span></a>
  <ul class="nav-links">
    <li><a href="/">All Series</a></li>
    <li><a href="/search/">Search</a></li>
  </ul>
  <button class="nav-burger" id="navBurger" aria-label="Menu"><span></span><span></span><span></span></button>
</nav>

<section class="search-hero">
  <p class="search-label">Full-text Search</p>
  <h1 class="search-title">Search All Episodes</h1>
  <div class="search-input-wrap">
    <input type="search" class="search-input" id="searchInput" placeholder="Search by title, topic, or keyword…" autofocus>
  </div>
</section>

<div class="search-results">
  <div class="result-count" id="resultCount"></div>
  <div id="resultsContainer"></div>
</div>

{{ partial "footer.html" . }}

<script>
const nav = document.getElementById('mainNav');
window.addEventListener('scroll', () => nav.classList.toggle('scrolled', window.scrollY > 50));
const burger = document.getElementById('navBurger');
const drawer = document.getElementById('navDrawer');
burger.addEventListener('click', () => { burger.classList.toggle('open'); drawer.classList.toggle('open'); document.body.style.overflow = drawer.classList.contains('open') ? 'hidden' : ''; });
function closeNav() { burger.classList.remove('open'); drawer.classList.remove('open'); document.body.style.overflow = ''; }

const SERIES_LABELS = {
  'ai-history': 'History of AI',
  'robotics': 'History of Robotics',
  'internet-history': 'History of the Internet'
};

let searchIndex = [];
fetch('/search-index.json').then(r => r.json()).then(data => {
  searchIndex = data.filter(e => e.published);
  const q = new URLSearchParams(window.location.search).get('q');
  if (q) { document.getElementById('searchInput').value = q; doSearch(q); }
});

function doSearch(q) {
  const query = q.trim().toLowerCase();
  if (!query) { document.getElementById('resultsContainer').innerHTML = ''; document.getElementById('resultCount').textContent = ''; return; }
  const results = searchIndex.filter(ep => {
    const haystack = (ep.title + ' ' + ep.description + ' ' + ep.tag + ' ' + ep.bodyText).toLowerCase();
    return haystack.includes(query);
  });
  document.getElementById('resultCount').textContent = results.length + ' result' + (results.length !== 1 ? 's' : '') + ' for "' + q + '"';
  if (!results.length) {
    document.getElementById('resultsContainer').innerHTML = '<p class="no-results">No episodes found. Try a different search.</p>';
    return;
  }
  document.getElementById('resultsContainer').innerHTML = results.map(ep =>
    '<a href="/' + ep.series + '/' + ep.slug + '/" class="result-card">' +
    '<div class="result-series">' + (SERIES_LABELS[ep.series] || ep.series) + '</div>' +
    '<div class="result-title">' + ep.title + '</div>' +
    '<div class="result-desc">' + ep.description + '</div>' +
    '</a>'
  ).join('');
}

document.getElementById('searchInput').addEventListener('input', e => doSearch(e.target.value));
</script>
</body>
</html>
