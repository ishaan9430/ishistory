baseURL = "https://ishistory.pages.dev/"
languageCode = "en-gb"
title = "ishistory"
enableRobotsTXT = true
enableGitInfo = false

[markup.goldmark.renderer]
  unsafe = true

[markup.highlight]
  noClasses = false

[taxonomies]
  series = "series"
  tag = "tags"

[params]
  author = "Ishaan"
  description = "The history behind the ideas shaping our world — science, technology, philosophy, engineering."
  googleAnalytics = "G-3N7G8QT9QF"

[outputFormats.RSS]
  mediaType = "application/rss+xml"
  baseName = "feed"

[outputs]
  home = ["HTML", "RSS"]
  section = ["HTML"]
  page = ["HTML"]
